<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kanonik siziq</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 20px; box-shadow: 0 4px 15px rgba(2, 2, 2, 0.1); }
        .inputs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .input-group { border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        input { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 25px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #formula-display { font-size: 1.3em; margin: 20px 0; color: #2c3e50; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 2px solid #080808; background-color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kanonik ten'leme</h2>
        
        <div class="inputs-grid">
            <div class="input-group">x₀: <input type="number" id="x0" value="5"></div>
            <div class="input-group">y₀: <input type="number" id="y0" value="2"></div>
            <div class="input-group">z₀: <input type="number" id="z0" value="3"></div>
            <div class="input-group">a: <input type="number" id="a" value="1"></div>
            <div class="input-group">b: <input type="number" id="b" value="4"></div>
            <div class="input-group">c: <input type="number" id="c" value="6"></div>
        </div>

        <button onclick="draw()">Siziw ham esapalw</button>

        <div id="formula-display">
         Kanonik tenleme:
          (x - 5)/1 = (y - 2)/4 = (z - 3)/6
        </div>

        <canvas id="myCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        function draw() {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            
            const x0 = parseFloat(document.getElementById('x0').value) || 0;
            const y0 = parseFloat(document.getElementById('y0').value) || 0;
            const z0 = parseFloat(document.getElementById('z0').value) || 0;
            const a = parseFloat(document.getElementById('a').value) || 1;
            const b = parseFloat(document.getElementById('b').value) || 1;
            const c = parseFloat(document.getElementById('c').value) || 1;
            const formulaDisplay = document.getElementById('formula-display');
            formulaDisplay.innerHTML = `Kanonik tenleme: <br> (x - ${x0})/${a} = (y - ${y0})/${b} = (z - ${z0})/${c}`;

            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(200, 0); ctx.lineTo(200, 400); // Vertikal
            ctx.moveTo(0, 200); ctx.lineTo(400, 200); // Gorizontal
            ctx.stroke();

            
            const centerX = 200;
            const centerY = 200;

            const angle = Math.PI / 4;
            const k = 0.5;

            const dx = a + c * k * Math.cos(angle);
            const dy = b + c * k * Math.sin(angle);
            const scale = 30;

            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX - dx * scale, centerY + dy * scale);
            ctx.lineTo(centerX + dx * scale, centerY - dy * scale);
            ctx.stroke();

            ctx.fillStyle = 'green';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        window.onload = draw;
    </script>
    <p>Du'ysenbaev Islambek</p>
</body>
</html>
